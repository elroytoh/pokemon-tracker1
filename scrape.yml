name: Nightly Pokemon Chase Card Tracker

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = midnight US Central, 1am Eastern, 10pm Pacific
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit data back to the repo

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install deps ──────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Cache Playwright browser (saves ~300MB download each run) ─────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      # ── 5. Run scraper ───────────────────────────────────────────────────
      - name: Run scraper
        run: python scraper.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── 6. Commit results ────────────────────────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.csv chase_cards.json
          # Only commit if something actually changed
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "data: nightly price update $(date -u +%Y-%m-%d)"
          git push
